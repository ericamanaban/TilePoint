<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Deep blue gradient matching the premium corporate identity -->
    <linearGradient id="tilepointGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0002be"/>
      <stop offset="45%" stop-color="#000068"/>
      <stop offset="100%" stop-color="#000025"/>
    </linearGradient>
  </defs>
  
  <!-- Smooth app icon squircle -->
  <rect width="512" height="512" rx="112" fill="url(#tilepointGrad)"/>
  
  <!-- Bold modern display typography aligned exactly to user's uploaded design -->
  <g transform="translate(0, 0)">
    <text x="60" y="185" fill="#ffffff" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="115" font-weight="900" letter-spacing="-0.04em">Tile</text>
    <text x="60" y="298" fill="#ffffff" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="115" font-weight="900" letter-spacing="-0.04em">Point</text>
  </g>
</svg>
