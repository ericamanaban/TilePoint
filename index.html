<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <title>TilePoint - POS & Multi-Branch Ledger</title>
    
    <!-- PWA Metadata & Favicons -->
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="manifest" href="./manifest.json" />
    
    <!-- Standalone install optimizations -->
    <meta name="theme-color" content="#1c1b1f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TilePoint" />
    <meta name="application-name" content="TilePoint" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
    
    <!-- Service Worker registration script -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then((registration) => {
              console.log('⚡ TilePoint PWA Service Worker loaded successfully:', registration.scope);
              
              // Handle update checking on intervals to make sure updates are processed proactively
              setInterval(() => {
                registration.update();
                console.log('[PWA Update Checker] Triggered proactive background check for service worker updates...');
              }, 60000); // check for updates every 60 seconds

              registration.addEventListener('updatefound', () => {
                const installingWorker = registration.installing;
                if (installingWorker) {
                  installingWorker.addEventListener('statechange', () => {
                    if (installingWorker.state === 'installed') {
                      if (navigator.serviceWorker.controller) {
                        // New content is available; prompt or automatically reload
                        console.log('[PWA Update Core] New update downloaded. Triggering automatic skipWaiting & active claim reload...');
                        installingWorker.postMessage({ action: 'skipWaiting' });
                      }
                    }
                  });
                }
              });
            })
            .catch((error) => {
              console.warn('❌ TilePoint PWA Service Worker registration failed:', error);
            });
        });

        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!refreshing) {
            refreshing = true;
            console.log('[PWA Lifecycle] Service worker controller changed. Performing window reload to activate changes...');
            window.location.reload();
          }
        });
      }
    </script>
  </body>
</html>
